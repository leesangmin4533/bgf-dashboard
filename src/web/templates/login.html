<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오더핏AI - 로그인</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icon_32x32.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #FFFBEB;
            color: #1C1208;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-card {
            background: #FFFFFF;
            border: 1px solid #FDE68A;
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(28,18,8,0.10);
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            overflow: hidden;
            margin: 0 auto 16px;
        }
        .login-logo img { width: 100%; height: 100%; object-fit: cover; }
        .login-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1C1208;
            margin-bottom: 4px;
        }
        .login-header p {
            font-size: 0.85rem;
            color: #78503A;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #78503A;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #FEF9C3;
            border: 1px solid #FDE68A;
            border-radius: 12px;
            color: #1C1208;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #F59E0B;
            box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
        }
        .form-group input::placeholder { color: #B89070; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #EA580C;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-login:hover { background: #C2410C; }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .error-msg, .success-msg {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #dc2626;
        }
        .success-msg {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            color: #16a34a;
        }
        .error-msg.visible, .success-msg.visible { display: block; }
        .toggle-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #78503A;
        }
        .toggle-link a {
            color: #EA580C;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }
        .toggle-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <img src="{{ url_for('static', filename='icon_64x64.png') }}" alt="오더핏AI">
                </div>
                <h1><span style="color:#EA580C">오더</span><span style="color:#D97706">핏</span><span style="color:#3B82F6">AI</span></h1>
                <p>편의점 AI 자동 발주</p>
            </div>

            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <!-- 로그인 폼 -->
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="btn-login" id="btnLogin">로그인</button>
                <div class="toggle-link">
                    계정이 없으신가요? <a href="/onboarding">회원가입</a>
                </div>
            </form>

        </div>
    </div>

    <script>
    (function() {
        var loginForm = document.getElementById('loginForm');
        var btnLogin = document.getElementById('btnLogin');
        var errorEl = document.getElementById('errorMsg');
        var successEl = document.getElementById('successMsg');

        function showError(msg) {
            successEl.classList.remove('visible');
            errorEl.textContent = msg;
            errorEl.classList.add('visible');
        }
        function showSuccess(msg) {
            errorEl.classList.remove('visible');
            successEl.textContent = msg;
            successEl.classList.add('visible');
        }
        function hideMessages() {
            errorEl.classList.remove('visible');
            successEl.classList.remove('visible');
        }

        /* 로그인 */
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            hideMessages();

            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;

            if (!username || !password) {
                showError('아이디와 비밀번호를 입력하세요.');
                return;
            }

            btnLogin.disabled = true;
            btnLogin.textContent = '로그인 중...';

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(function(resp) {
                return resp.json().then(function(data) {
                    return { ok: resp.ok, data: data };
                });
            })
            .then(function(result) {
                if (result.ok) {
                    window.location.href = '/';
                } else {
                    showError(result.data.error || '로그인에 실패했습니다.');
                    btnLogin.disabled = false;
                    btnLogin.textContent = '로그인';
                }
            })
            .catch(function() {
                showError('서버에 연결할 수 없습니다.');
                btnLogin.disabled = false;
                btnLogin.textContent = '로그인';
            });
        });

    })();
    </script>
</body>
</html>
